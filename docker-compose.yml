services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    user: root
    network_mode: host
    volumes:
      - .:/workspace
      - ./.artifacts:/opt/artifacts:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock
      - /run/kairos-runtime:/run/kairos-runtime
      - /tmp:/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SANDBOX_DRY_RUN: "0"
      SANDBOX_IMAGE: "debian:slim"
      API_KEY: "${API_KEY:-}"
      BASE_URL: "${BASE_URL:-}"
      MODEL: "${MODEL:-}"
      STATE_DAEMON_CLOUD_API_KEY: "${STATE_DAEMON_CLOUD_API_KEY:-}"
      STATE_DAEMON_CLOUD_BASE_URL: "${STATE_DAEMON_CLOUD_BASE_URL:-}"
      STATE_DAEMON_CLOUD_MODEL: "${STATE_DAEMON_CLOUD_MODEL:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://127.0.0.1:11434}"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-qwen3-embedding:0.6b}"
      EMBED_PROVIDER: "${EMBED_PROVIDER:-ollama}"
      VFS_READY_TIMEOUT_SEC: "${VFS_READY_TIMEOUT_SEC:-1800}"
      TELEGRAM_MODE: "${TELEGRAM_MODE:-userbot}"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID:-}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH:-}"
      TELEGRAM_PHONE: "${TELEGRAM_PHONE:-}"
      TELEGRAM_PASSWORD: "${TELEGRAM_PASSWORD:-}"
      TELEGRAM_SESSION_STRING: "${TELEGRAM_SESSION_STRING:-}"
      TELEGRAM_SILENT_STREAM: "${TELEGRAM_SILENT_STREAM:-false}"
      OWNER_USER_ID: "${OWNER_USER_ID:-}"
      MEMORY_FILES_ROOT: "/workspace/.runtime/memory_files"
      # 同步 Socket 路径变量 (客户端 + 服务端)
      KAIROS_ENCLAVE_SOCKET: "unix:///run/kairos-runtime/sockets/kairos-runtime-enclave.sock"
      KAIROS_VFS_SOCKET: "unix:///run/kairos-runtime/sockets/kairos-runtime-vfs.sock"
      AGENT_ENCLAVE_BIND_ADDR: "unix:///run/kairos-runtime/sockets/kairos-runtime-enclave.sock"
      AGENT_ENCLAVE_TARGET: "unix:///run/kairos-runtime/sockets/kairos-runtime-enclave.sock"
      MEMORY_VFS_TARGET: "unix:///run/kairos-runtime/sockets/kairos-runtime-vfs.sock"
    command: /workspace/entrypoint.sh

  sandboxd:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    user: root
    depends_on:
      - app
    volumes:
      - .:/workspace
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock
      - /tmp:/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SANDBOX_IMAGE: "debian:slim"
      BOT_TOKEN: "${BOT_TOKEN:-}"
      API_KEY: "${API_KEY:-}"
    command: >
      bash -lc "
      cargo run --manifest-path src/sandbox/Cargo.toml
      "
    profiles:
      - sandbox
